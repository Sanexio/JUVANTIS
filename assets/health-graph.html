<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juvantis Health Graph</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0A0F1A;font-family:'Inter',sans-serif;color:#E0E0E0}
svg{display:block;width:100%;height:100vh}
text{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
circle,line,polygon{shape-rendering:geometricPrecision}

#header{position:absolute;top:16px;left:28px;z-index:101;pointer-events:none}
#header h1{font-size:26px;font-weight:700;background:linear-gradient(135deg,#028090,#02C39A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-0.5px}
#header p{font-size:13px;color:#8899AA;margin-top:4px;font-weight:400}

#search-box{position:absolute;top:24px;left:50%;transform:translateX(-50%);z-index:100}
#search-input{width:280px;padding:10px 16px 10px 38px;border-radius:24px;border:1px solid rgba(2,128,144,0.3);background:rgba(10,15,26,0.85);color:#E0E0E0;font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s}
#search-input:focus{border-color:#02C39A}
#search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#607080;font-size:14px;pointer-events:none}

#legend{position:absolute;bottom:20px;right:20px;z-index:100;display:flex;gap:16px;align-items:center;font-size:11px;color:#8899AA}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-diamond{width:8px;height:8px;transform:rotate(45deg);flex-shrink:0;border-radius:1px}

#info-panel{position:absolute;top:90px;right:28px;z-index:100;width:280px;background:rgba(10,15,26,0.85);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:0;display:none;overflow:hidden}
#info-header{padding:16px 20px 12px;border-bottom:1px solid rgba(255,255,255,0.06)}
#info-header h2{font-size:16px;font-weight:600;color:#E8E8E8}
#info-header .info-type{font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-top:4px}
#info-body{padding:14px 20px 18px;font-size:12px;line-height:1.6;color:#99AABB;max-height:400px;overflow-y:auto}
#info-body .info-section{margin-bottom:10px}
#info-body .info-section-title{font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:#607080;margin-bottom:4px}
#info-body .info-connected{display:flex;flex-wrap:wrap;gap:4px}
#info-body .info-tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;background:rgba(2,128,144,0.15);color:#02C39A;border:1px solid rgba(2,128,144,0.25)}
#info-close{position:absolute;top:12px;right:14px;background:none;border:none;color:#607080;cursor:pointer;font-size:18px;line-height:1}

#tooltip{position:absolute;z-index:200;padding:8px 14px;border-radius:8px;background:rgba(10,15,26,0.92);border:1px solid rgba(255,255,255,0.1);font-size:12px;color:#D0D8E0;pointer-events:none;display:none;max-width:260px;white-space:nowrap}

#node-count{display:none}

#error-log{position:fixed;bottom:0;left:0;right:0;background:#E63946;color:white;padding:8px 16px;font-size:12px;display:none;z-index:9999}
</style>
</head>
<body>

<div id="header">
  <h1>Juvantis Health Graph</h1>
  <p>Wie Organe, Laborwerte und Erkrankungen zusammenhaengen</p>
</div>

<div id="search-box">
  <span id="search-icon">&#128269;</span>
  <input id="search-input" type="text" placeholder="Suche nach Organ, Laborwert, Erkrankung...">
</div>

<div id="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#E63946"></div>Organ</div>
  <div class="legend-item"><div class="legend-dot" style="background:#028090"></div>Laborwert</div>
  <div class="legend-item"><div class="legend-diamond" style="background:#FFB400"></div>Erkrankung</div>
</div>

<div id="info-panel">
  <button id="info-close" onclick="closeInfoPanel()">&times;</button>
  <div id="info-header"><h2 id="info-title"></h2><div id="info-type-label" class="info-type"></div></div>
  <div id="info-body"></div>
</div>

<div id="tooltip"></div>
<div id="node-count"></div>

<svg id="graph"></svg>

<div id="error-log"></div>
<script>
window.onerror=function(msg,url,line){var el=document.getElementById('error-log');el.style.display='block';el.textContent=msg+' (line '+line+')';};
</script>

// =========================================================
// BUILD NODES AND LINKS
// =========================================================

function getSeverityColor(severity) {
  var s = (severity || '').toLowerCase();
  if (s.indexOf('lebensbedrohlich') !== -1) return '#E63946';
  if (s.indexOf('schwer') !== -1) return '#FF6B35';
  if (s.indexOf('mittel') !== -1) return '#FFB400';
  if (s.indexOf('leicht') !== -1) return '#7DCE82';
  return '#A8A8A8';
}

var nodeMap = {};
var nodes = [];
var links = [];

// Organs
DATA.organs.forEach(function(o) {
  var n = {id: o.id, label: o.label, type: 'organ', r: 35, color: o.color, system: o.system, description: o.description};
  nodes.push(n);
  nodeMap[o.id] = n;
});

// Lab values
DATA.labvalues.forEach(function(l) {
  var n = {id: l.id, label: l.label, type: 'labvalue', r: 16, color: '#028090', unit: l.unit, normalRange: l.normalRange, category: l.category, significance: l.significance};
  nodes.push(n);
  nodeMap[l.id] = n;
});

// Diseases
DATA.diseases.forEach(function(d) {
  var n = {id: d.id, label: d.label, type: 'disease', r: 18, color: getSeverityColor(d.severity), severity: d.severity, icd10: d.icd10, category: d.category};
  nodes.push(n);
  nodeMap[d.id] = n;
});

// Edges
DATA.edges.forEach(function(e) {
  if (nodeMap[e.from] && nodeMap[e.to]) {
    links.push({source: e.from, target: e.to, type: e.type, detail: e.detail || ''});
  }
});

// Adjacency map for neighbor lookup
var adjacency = {};
nodes.forEach(function(n) { adjacency[n.id] = new Set(); });
links.forEach(function(l) {
  var sid = typeof l.source === 'object' ? l.source.id : l.source;
  var tid = typeof l.target === 'object' ? l.target.id : l.target;
  adjacency[sid].add(tid);
  adjacency[tid].add(sid);
});

// Node count display
document.getElementById('node-count').textContent = nodes.length + ' Knoten, ' + links.length + ' Verbindungen';

// =========================================================
// SVG SETUP
// =========================================================
var W = Math.max(document.documentElement.clientWidth || 1200, 1200);
var H = Math.max(document.documentElement.clientHeight || 800, 800);

var svg = d3.select('#graph')
  .attr('viewBox', '0 0 ' + W + ' ' + H)
  .attr('preserveAspectRatio', 'xMidYMid meet')
  .style('width', '100%')
  .style('height', '100vh');

// Defs for arrowheads
var defs = svg.append('defs');

defs.append('marker').attr('id','arrow-ol').attr('viewBox','0 0 10 6').attr('refX',10).attr('refY',3)
  .attr('markerWidth',8).attr('markerHeight',6).attr('orient','auto')
  .append('path').attr('d','M0,0 L10,3 L0,6 Z').attr('fill','#028090');

defs.append('marker').attr('id','arrow-ld').attr('viewBox','0 0 10 6').attr('refX',10).attr('refY',3)
  .attr('markerWidth',8).attr('markerHeight',6).attr('orient','auto')
  .append('path').attr('d','M0,0 L10,3 L0,6 Z').attr('fill','#FF8C42');

defs.append('marker').attr('id','arrow-do').attr('viewBox','0 0 10 6').attr('refX',10).attr('refY',3)
  .attr('markerWidth',8).attr('markerHeight',6).attr('orient','auto')
  .append('path').attr('d','M0,0 L10,3 L0,6 Z').attr('fill','#E63946');

// Container group
var g = svg.append('g');

// Zoom behavior
var zoom = d3.zoom()
  .scaleExtent([0.15, 4])
  .on('zoom', function(event) {
    g.attr('transform', event.transform);
  });

svg.call(zoom);

// Set initial transform centered
svg.call(zoom.transform, d3.zoomIdentity.translate(Math.round(W / 2), Math.round(H / 2)).scale(1));

// =========================================================
// DRAW LINKS
// =========================================================
function edgeStyle(type) {
  if (type === 'organ_produces_lab') return {stroke: '#028090', dash: 'none', marker: 'url(#arrow-ol)'};
  if (type === 'lab_indicates_disease') return {stroke: '#FF8C42', dash: '6,4', marker: 'url(#arrow-ld)'};
  return {stroke: '#E63946', dash: '2,4', marker: 'url(#arrow-do)'};
}

var linkGroup = g.append('g').attr('class', 'links');
var linkEls = linkGroup.selectAll('line')
  .data(links)
  .join('line')
  .each(function(d) {
    var s = edgeStyle(d.type);
    d3.select(this)
      .attr('stroke', s.stroke)
      .attr('stroke-width', 1.2)
      .attr('stroke-opacity', 0.5)
      .attr('stroke-dasharray', s.dash === 'none' ? null : s.dash)
      .attr('marker-end', s.marker);
  });

// =========================================================
// DRAW NODES
// =========================================================
var nodeGroup = g.append('g').attr('class', 'nodes');
var nodeEls = nodeGroup.selectAll('g')
  .data(nodes)
  .join('g')
  .attr('cursor', 'pointer');

// Draw shape per type
nodeEls.each(function(d) {
  var el = d3.select(this);
  if (d.type === 'disease') {
    var s = d.r;
    el.append('rect')
      .attr('width', s * 1.4)
      .attr('height', s * 1.4)
      .attr('x', -s * 0.7)
      .attr('y', -s * 0.7)
      .attr('rx', 3)
      .attr('transform', 'rotate(45)')
      .attr('fill', d.color)
      .attr('fill-opacity', 1)
      .attr('stroke', d.color)
      .attr('stroke-width', 1.5)
      .attr('stroke-opacity', 0.5);
  } else {
    el.append('circle')
      .attr('r', d.r)
      .attr('fill', d.color)
      .attr('fill-opacity', 1)
      .attr('stroke', d.color)
      .attr('stroke-width', d.type === 'organ' ? 2.5 : 1.5)
      .attr('stroke-opacity', 0.4);
  }
});

// Labels
nodeEls.append('text')
  .text(function(d) {
    var lbl = d.label;
    if (d.type === 'organ') return lbl;
    if (lbl.length > 16) return lbl.substring(0, 14) + '..';
    return lbl;
  })
  .attr('text-anchor', 'middle')
  .attr('dy', function(d) {
    if (d.type === 'organ') return d.r + 16;
    return d.r + 14;
  })
  .attr('font-size', function(d) { return d.type === 'organ' ? '12px' : '10px'; })
  .attr('font-weight', function(d) { return d.type === 'organ' ? '600' : '400'; })
  .attr('fill', function(d) { return d.type === 'organ' ? '#E8E8E8' : '#8899AA'; })
  .attr('pointer-events', 'none');

// =========================================================
// FORCE SIMULATION
// =========================================================
var simulation = d3.forceSimulation(nodes)
  .force('center', d3.forceCenter(0, 0))
  .force('charge', d3.forceManyBody().strength(function(d) {
    if (d.type === 'organ') return -600;
    if (d.type === 'disease') return -200;
    return -300;
  }))
  .force('link', d3.forceLink(links).id(function(d) { return d.id; }).distance(function(d) {
    if (d.type === 'organ_produces_lab') return 120;
    if (d.type === 'lab_indicates_disease') return 100;
    return 140;
  }).strength(0.4))
  .force('collide', d3.forceCollide().radius(function(d) { return d.r + 10; }).strength(0.7))
  .alpha(1)
  .alphaDecay(0.02)
  .on('tick', ticked);

function ticked() {
  linkEls
    .attr('x1', function(d) { return d.source.x; })
    .attr('y1', function(d) { return d.source.y; })
    .attr('x2', function(d) {
      var dx = d.target.x - d.source.x;
      var dy = d.target.y - d.source.y;
      var dist = Math.sqrt(dx * dx + dy * dy) || 1;
      var tr = (nodeMap[d.target.id] || {r: 16}).r + 4;
      return d.target.x - (dx / dist) * tr;
    })
    .attr('y2', function(d) {
      var dx = d.target.x - d.source.x;
      var dy = d.target.y - d.source.y;
      var dist = Math.sqrt(dx * dx + dy * dy) || 1;
      var tr = (nodeMap[d.target.id] || {r: 16}).r + 4;
      return d.target.y - (dy / dist) * tr;
    });

  nodeEls.attr('transform', function(d) { return 'translate(' + Math.round(d.x) + ',' + Math.round(d.y) + ')'; });
}

// =========================================================
// DRAG
// =========================================================
var drag = d3.drag()
  .on('start', function(event, d) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x;
    d.fy = d.y;
  })
  .on('drag', function(event, d) {
    d.fx = event.x;
    d.fy = event.y;
  })
  .on('end', function(event, d) {
    if (!event.active) simulation.alphaTarget(0);
    d.fx = null;
    d.fy = null;
  });

nodeEls.call(drag);

// =========================================================
// TOOLTIP
// =========================================================
var tooltip = document.getElementById('tooltip');

nodeEls.on('mouseover', function(event, d) {
  tooltip.style.display = 'block';
  var html = '<strong>' + d.label + '</strong>';
  if (d.type === 'labvalue') html += '<br>' + d.category + ' | Norm: ' + d.normalRange + ' ' + d.unit;
  if (d.type === 'disease') html += '<br>' + d.category + ' | ' + d.severity + ' | ICD: ' + d.icd10;
  if (d.type === 'organ') html += '<br>' + d.system;
  tooltip.innerHTML = html;

  linkEls.attr('stroke-opacity', function(l) {
    var sid = typeof l.source === 'object' ? l.source.id : l.source;
    var tid = typeof l.target === 'object' ? l.target.id : l.target;
    return (sid === d.id || tid === d.id) ? 0.8 : 0.08;
  }).attr('stroke-width', function(l) {
    var sid = typeof l.source === 'object' ? l.source.id : l.source;
    var tid = typeof l.target === 'object' ? l.target.id : l.target;
    return (sid === d.id || tid === d.id) ? 2.5 : 1;
  });

  var neighbors = adjacency[d.id];
  nodeEls.attr('opacity', function(n) {
    return (n.id === d.id || neighbors.has(n.id)) ? 1 : 0.15;
  });
})
.on('mousemove', function(event) {
  tooltip.style.left = (event.pageX + 14) + 'px';
  tooltip.style.top = (event.pageY - 10) + 'px';
})
.on('mouseout', function() {
  tooltip.style.display = 'none';
  linkEls.attr('stroke-opacity', 0.5).attr('stroke-width', 1.2);
  nodeEls.attr('opacity', 1);
});

// =========================================================
// CLICK -> INFO PANEL
// =========================================================
var selectedNode = null;

nodeEls.on('click', function(event, d) {
  event.stopPropagation();
  selectedNode = d;
  showInfoPanel(d);
});

svg.on('click', function() {
  closeInfoPanel();
  linkEls.attr('stroke-opacity', 0.5).attr('stroke-width', 1.2);
  nodeEls.attr('opacity', 1);
  selectedNode = null;
});

function showInfoPanel(d) {
  var panel = document.getElementById('info-panel');
  var title = document.getElementById('info-title');
  var typeLabel = document.getElementById('info-type-label');
  var body = document.getElementById('info-body');

  title.textContent = d.label;

  var typeColors = {organ: '#E63946', labvalue: '#028090', disease: '#FFB400'};
  var typeNames = {organ: 'Organ', labvalue: 'Laborwert', disease: 'Erkrankung'};
  typeLabel.textContent = typeNames[d.type] || d.type;
  typeLabel.style.color = typeColors[d.type] || '#AAA';

  var html = '';

  if (d.type === 'organ') {
    html += '<div class="info-section"><div class="info-section-title">System</div>' + d.system + '</div>';
    html += '<div class="info-section"><div class="info-section-title">Beschreibung</div>' + d.description + '</div>';
  } else if (d.type === 'labvalue') {
    html += '<div class="info-section"><div class="info-section-title">Kategorie</div>' + d.category + '</div>';
    html += '<div class="info-section"><div class="info-section-title">Normbereich</div>' + d.normalRange + ' ' + d.unit + '</div>';
    html += '<div class="info-section"><div class="info-section-title">Bedeutung</div>' + d.significance + '</div>';
  } else if (d.type === 'disease') {
    html += '<div class="info-section"><div class="info-section-title">Kategorie</div>' + d.category + '</div>';
    html += '<div class="info-section"><div class="info-section-title">Schweregrad</div>' + d.severity + '</div>';
    html += '<div class="info-section"><div class="info-section-title">ICD-10</div>' + d.icd10 + '</div>';
  }

  var neighbors = adjacency[d.id];
  if (neighbors.size > 0) {
    var connected = Array.from(neighbors).map(function(nid) {
      var n = nodeMap[nid];
      return n ? '<span class="info-tag" style="border-color:' + n.color + '40;color:' + n.color + '">' + n.label + '</span>' : '';
    }).join('');
    html += '<div class="info-section"><div class="info-section-title">Verbunden mit (' + neighbors.size + ')</div><div class="info-connected">' + connected + '</div></div>';
  }

  body.innerHTML = html;
  panel.style.display = 'block';
}

// =========================================================
// SEARCH
// =========================================================
var searchInput = document.getElementById('search-input');
searchInput.addEventListener('input', function() {
  var query = this.value.toLowerCase().trim();
  if (!query) {
    nodeEls.attr('opacity', 1);
    linkEls.attr('stroke-opacity', 0.5);
    return;
  }

  var matchIds = new Set();
  nodes.forEach(function(n) {
    var searchable = (n.label + ' ' + (n.category || '') + ' ' + (n.system || '') + ' ' + (n.icd10 || '')).toLowerCase();
    if (searchable.indexOf(query) !== -1) matchIds.add(n.id);
  });

  var expandedIds = new Set(matchIds);
  matchIds.forEach(function(mid) {
    adjacency[mid].forEach(function(nid) { expandedIds.add(nid); });
  });

  nodeEls.attr('opacity', function(n) {
    if (matchIds.has(n.id)) return 1;
    if (expandedIds.has(n.id)) return 0.5;
    return 0.08;
  });

  linkEls.attr('stroke-opacity', function(l) {
    var sid = typeof l.source === 'object' ? l.source.id : l.source;
    var tid = typeof l.target === 'object' ? l.target.id : l.target;
    if (matchIds.has(sid) || matchIds.has(tid)) return 0.6;
    return 0.03;
  });
});

// =========================================================
// DONE
// =========================================================
console.log('Juvantis Health Graph loaded: ' + nodes.length + ' nodes, ' + links.length + ' edges');

} catch(err) {
  var el = document.getElementById('error-log');
  el.style.display = 'block';
  el.textContent = 'Init error: ' + err.message + ' (stack: ' + (err.stack || '').substring(0, 200) + ')';
  console.error(err);
}
}); // end DOMContentLoaded
</script>

<script>
function closeInfoPanel() {
  document.getElementById('info-panel').style.display = 'none';
}
</script>
