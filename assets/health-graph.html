<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juvantis Health Graph</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0A0F1A;font-family:'Inter',system-ui,-apple-system,sans-serif;color:#E0E0E0}
#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
svg{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1}

/* Header */
#header{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 24px;display:flex;align-items:center;gap:16px;
  background:linear-gradient(180deg,rgba(10,15,26,0.95) 0%,rgba(10,15,26,0.7) 80%,rgba(10,15,26,0) 100%);
  pointer-events:none}
#header>*{pointer-events:auto}
.header-accent{width:4px;height:48px;border-radius:2px;background:linear-gradient(180deg,#028090,#02C39A);flex-shrink:0}
.header-text h1{font-size:22px;font-weight:700;letter-spacing:-0.5px;
  background:linear-gradient(135deg,#02C39A,#028090);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-text p{font-size:12px;font-weight:400;color:#8899AA;margin-top:2px}

/* Search */
#search-box{position:fixed;top:16px;left:280px;z-index:100;width:340px}
@media(max-width:768px){#search-box{left:16px;top:80px;width:calc(100% - 32px)}}
#search-input{width:100%;padding:10px 14px 10px 38px;border:1px solid rgba(2,192,154,0.25);border-radius:10px;
  background:rgba(10,15,26,0.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  color:#E0E0E0;font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.2s}
#search-input:focus{border-color:rgba(2,192,154,0.6)}
#search-input::placeholder{color:#556677}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#028090;font-size:14px}

/* Legend */
#legend{position:fixed;top:16px;right:16px;z-index:100;
  background:rgba(10,15,26,0.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 16px;min-width:200px}
#legend h3{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#028090;margin-bottom:10px}
.legend-item{display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer;opacity:1;transition:opacity 0.2s;font-size:12px}
.legend-item.dimmed{opacity:0.3}
.legend-item:hover{opacity:1}
.legend-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.legend-dot.diamond{border-radius:0;transform:rotate(45deg);width:11px;height:11px}
.legend-line{width:20px;height:0;border-top:2px solid;flex-shrink:0}
.legend-line.dashed{border-top-style:dashed}
.legend-line.dotted{border-top-style:dotted;border-top-width:2px}
.legend-sep{height:1px;background:rgba(255,255,255,0.06);margin:8px 0}

/* Info Panel */
#info-panel{position:fixed;top:80px;right:16px;z-index:99;width:300px;max-height:calc(100vh - 100px);overflow-y:auto;
  background:rgba(10,15,26,0.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(2,192,154,0.15);border-radius:14px;padding:20px;
  transform:translateX(340px);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
  scrollbar-width:thin;scrollbar-color:rgba(2,192,154,0.3) transparent}
#info-panel.visible{transform:translateX(0)}
@media(max-width:768px){
  #info-panel{top:auto;bottom:0;left:0;right:0;width:100%;max-height:50vh;border-radius:14px 14px 0 0;
    transform:translateY(100%)}
  #info-panel.visible{transform:translateY(0)}
  #legend{display:none}
}
#info-panel::-webkit-scrollbar{width:4px}
#info-panel::-webkit-scrollbar-thumb{background:rgba(2,192,154,0.3);border-radius:2px}
.info-close{position:absolute;top:12px;right:12px;background:none;border:none;color:#667;font-size:18px;cursor:pointer;padding:4px;line-height:1}
.info-close:hover{color:#aaa}
.info-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.info-color-dot{width:20px;height:20px;border-radius:50%;flex-shrink:0}
.info-title{font-size:18px;font-weight:600}
.info-system{font-size:11px;color:#028090;font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
.info-desc{font-size:12px;color:#8899AA;line-height:1.5;margin-bottom:16px}
.info-section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#556;margin-bottom:8px}
.info-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.info-chip{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;transition:all 0.15s;border:1px solid}
.info-chip.lab{background:rgba(2,128,144,0.15);border-color:rgba(2,128,144,0.3);color:#02C39A}
.info-chip.lab:hover{background:rgba(2,128,144,0.3)}
.info-chip.disease{border-color:rgba(255,255,255,0.1);color:#ddd}
.info-chip.disease:hover{opacity:0.8}
.info-chip .arrow{font-size:10px;margin-left:3px;opacity:0.6}

/* Tooltip */
#tooltip{position:fixed;z-index:200;pointer-events:none;
  background:rgba(10,15,26,0.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(2,192,154,0.25);border-radius:8px;padding:10px 14px;
  font-size:12px;max-width:260px;opacity:0;transition:opacity 0.15s;line-height:1.5}
#tooltip.visible{opacity:1}
#tooltip .tt-label{font-weight:600;font-size:13px;margin-bottom:2px}
#tooltip .tt-detail{color:#8899AA;font-size:11px}
#tooltip .tt-range{color:#02C39A;font-size:11px;margin-top:2px}

/* Node stats */
#stats{position:fixed;bottom:16px;left:16px;z-index:100;font-size:11px;color:#445566}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<div id="header">
  <div class="header-accent"></div>
  <div class="header-text">
    <h1>Juvantis Health Graph</h1>
    <p>Wie Organe, Laborwerte und Erkrankungen zusammenh&auml;ngen</p>
  </div>
</div>

<div id="search-box">
  <span class="search-icon">&#128269;</span>
  <input id="search-input" type="text" placeholder="Suche nach Organ, Laborwert oder Erkrankung..." autocomplete="off" spellcheck="false">
</div>

<div id="legend">
  <h3>Legende</h3>
  <div class="legend-item" data-filter="organ"><div class="legend-dot" style="background:#028090"></div><span>Organ</span></div>
  <div class="legend-item" data-filter="labvalue"><div class="legend-dot" style="background:rgba(2,128,144,0.8);width:10px;height:10px"></div><span>Laborwert</span></div>
  <div class="legend-item" data-filter="disease"><div class="legend-dot diamond" style="background:#FF6B35"></div><span>Erkrankung</span></div>
  <div class="legend-sep"></div>
  <div class="legend-item" data-filter="organ_produces_lab"><div class="legend-line" style="border-color:#02C39A"></div><span>Organ &rarr; Labor</span></div>
  <div class="legend-item" data-filter="lab_indicates_disease"><div class="legend-line dashed" style="border-color:#FF6B35"></div><span>Labor &rarr; Krankheit</span></div>
  <div class="legend-item" data-filter="disease_affects_organ"><div class="legend-line dotted" style="border-color:#E63946"></div><span>Krankheit &rarr; Organ</span></div>
</div>

<div id="info-panel">
  <button class="info-close" id="info-close">&times;</button>
  <div id="info-content"></div>
</div>

<div id="tooltip"></div>
<div id="stats"></div>

<svg id="graph"></svg>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>

// ===== BACKGROUND CANVAS =====
(function drawBg() {
  const c = document.getElementById("bg-canvas");
  const ctx = c.getContext("2d");
  function resize() { c.width = window.innerWidth; c.height = window.innerHeight; draw(); }
  function draw() {
    const w = c.width, h = c.height;
    ctx.fillStyle = "#0A0F1A";
    ctx.fillRect(0, 0, w, h);
    const circles = [
      { x: w * 0.2, y: h * 0.3, r: 350, color: "rgba(2,128,144,0.04)" },
      { x: w * 0.75, y: h * 0.6, r: 400, color: "rgba(2,195,154,0.03)" },
      { x: w * 0.5, y: h * 0.15, r: 280, color: "rgba(156,89,182,0.025)" },
      { x: w * 0.85, y: h * 0.2, r: 200, color: "rgba(230,57,70,0.02)" },
      { x: w * 0.1, y: h * 0.8, r: 300, color: "rgba(2,128,144,0.03)" },
    ];
    circles.forEach(ci => {
      const g = ctx.createRadialGradient(ci.x, ci.y, 0, ci.x, ci.y, ci.r);
      g.addColorStop(0, ci.color);
      g.addColorStop(1, "transparent");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, w, h);
    });
  }
  window.addEventListener("resize", resize);
  resize();
})();

RAW_DATA.labvalues.forEach((l, i) => {
  const angle = (2 * Math.PI * i) / RAW_DATA.labvalues.length;
  const n = { id: l.id, label: l.label, type: "labvalue", unit: l.unit, normalRange: l.normalRange, category: l.category, significance: l.significance, color: "#028090", radius: 18, x: Math.cos(angle) * 380, y: Math.sin(angle) * 380 };
  nodes.push(n);
  nodeMap[l.id] = n;
});
RAW_DATA.diseases.forEach((d, i) => {
  const angle = (2 * Math.PI * i) / RAW_DATA.diseases.length;
  const n = { id: d.id, label: d.label, type: "disease", severity: d.severity, icd10: d.icd10, category: d.category, color: severityColor(d.severity), radius: 20, x: Math.cos(angle) * 500, y: Math.sin(angle) * 500 };
  nodes.push(n);
  nodeMap[d.id] = n;
});

const links = RAW_DATA.edges.map(e => ({
  source: e.from,
  target: e.to,
  type: e.type,
  detail: e.detail || "",
  direction: e.direction || ""
}));

// Build adjacency index
nodes.forEach(n => { edgeIndex[n.id] = new Set(); });
links.forEach(l => {
  const sid = typeof l.source === "object" ? l.source.id : l.source;
  const tid = typeof l.target === "object" ? l.target.id : l.target;
  edgeIndex[sid].add(tid);
  edgeIndex[tid].add(sid);
});

// ===== SVG SETUP =====
const width = Math.max(window.innerWidth || 1200, 800);
const height = Math.max(window.innerHeight || 800, 600);
const svg = d3.select("#graph").attr("viewBox", [-width/2, -height/2, width, height]);

// Defs for arrowheads and glow
const defs = svg.append("defs");

// Arrow markers
["#02C39A", "#FF6B35", "#E63946"].forEach((c, i) => {
  defs.append("marker")
    .attr("id", "arrow-" + i)
    .attr("viewBox", "0 0 10 10")
    .attr("refX", 10).attr("refY", 5)
    .attr("markerWidth", 6).attr("markerHeight", 6)
    .attr("orient", "auto-start-reverse")
    .append("path").attr("d", "M0,1 L10,5 L0,9 Z").attr("fill", c).attr("opacity", 0.7);
});

// Glow filter
const glow = defs.append("filter").attr("id", "glow").attr("x", "-50%").attr("y", "-50%").attr("width", "200%").attr("height", "200%");
glow.append("feGaussianBlur").attr("stdDeviation", "4").attr("result", "blur");
const glowMerge = glow.append("feMerge");
glowMerge.append("feMergeNode").attr("in", "blur");
glowMerge.append("feMergeNode").attr("in", "SourceGraphic");

// Drop shadow
const shadow = defs.append("filter").attr("id", "shadow").attr("x", "-30%").attr("y", "-30%").attr("width", "160%").attr("height", "160%");
shadow.append("feDropShadow").attr("dx", 0).attr("dy", 2).attr("stdDeviation", 4).attr("flood-color", "rgba(0,0,0,0.5)");

const container = svg.append("g").attr("id", "zoom-container");

// ===== ZOOM =====
let currentTransform = d3.zoomIdentity;
const zoomBehavior = d3.zoom()
  .scaleExtent([0.15, 4])
  .on("zoom", (event) => {
    currentTransform = event.transform;
    container.attr("transform", event.transform);
    updateLabelVisibility();
  });
svg.call(zoomBehavior);
// Initial zoom to center
svg.call(zoomBehavior.transform, d3.zoomIdentity.scale(0.75));

// ===== LINKS =====
const linkG = container.append("g").attr("class", "links");
const linkElements = linkG.selectAll("line").data(links).join("line")
  .attr("stroke", d => d.type === "organ_produces_lab" ? "#02C39A" : d.type === "lab_indicates_disease" ? "#FF6B35" : "#E63946")
  .attr("stroke-width", d => d.type === "organ_produces_lab" ? 1.8 : d.type === "lab_indicates_disease" ? 1.3 : 0.9)
  .attr("stroke-opacity", d => d.type === "organ_produces_lab" ? 0.5 : d.type === "lab_indicates_disease" ? 0.4 : 0.35)
  .attr("stroke-dasharray", d => d.type === "lab_indicates_disease" ? "6,4" : d.type === "disease_affects_organ" ? "2,3" : "none")
  .attr("marker-end", d => d.type === "organ_produces_lab" ? "url(#arrow-0)" : d.type === "lab_indicates_disease" ? "url(#arrow-1)" : "url(#arrow-2)");

// ===== NODES =====
const nodeG = container.append("g").attr("class", "nodes");
const nodeElements = nodeG.selectAll("g").data(nodes).join("g")
  .attr("class", d => "node node-" + d.type)
  .style("cursor", "pointer")
  .call(d3.drag()
    .on("start", dragStart)
    .on("drag", dragging)
    .on("end", dragEnd)
  );

// Organ circles
nodeElements.filter(d => d.type === "organ")
  .append("circle")
  .attr("r", d => d.radius)
  .attr("fill", d => d.color)
  .attr("fill-opacity", 0.85)
  .attr("stroke", d => d.color)
  .attr("stroke-width", 2)
  .attr("stroke-opacity", 0.4)
  .attr("filter", "url(#shadow)");

// Lab circles
nodeElements.filter(d => d.type === "labvalue")
  .append("circle")
  .attr("r", d => d.radius)
  .attr("fill", "#028090")
  .attr("fill-opacity", 0.7)
  .attr("stroke", "#02C39A")
  .attr("stroke-width", 1)
  .attr("stroke-opacity", 0.3);

// Disease diamonds
nodeElements.filter(d => d.type === "disease")
  .append("rect")
  .attr("width", d => d.radius * 1.4)
  .attr("height", d => d.radius * 1.4)
  .attr("x", d => -d.radius * 0.7)
  .attr("y", d => -d.radius * 0.7)
  .attr("rx", 3)
  .attr("transform", "rotate(45)")
  .attr("fill", d => d.color)
  .attr("fill-opacity", 0.75)
  .attr("stroke", d => d.color)
  .attr("stroke-width", 1)
  .attr("stroke-opacity", 0.4);

// Labels
const labels = nodeElements.append("text")
  .attr("text-anchor", "middle")
  .attr("dy", d => d.type === "organ" ? (d.radius + 14) : d.type === "labvalue" ? (d.radius + 11) : (d.radius + 12))
  .attr("font-size", d => d.type === "organ" ? "11px" : "9px")
  .attr("font-weight", d => d.type === "organ" ? "600" : "400")
  .attr("fill", d => d.type === "organ" ? "#E0E0E0" : d.type === "labvalue" ? "#8899AA" : "#998877")
  .attr("pointer-events", "none")
  .text(d => d.label);

function updateLabelVisibility() {
  const k = currentTransform.k;
  labels.attr("display", d => {
    if (d.type === "organ") return k > 0.35 ? null : "none";
    if (d.type === "labvalue") return k > 0.6 ? null : "none";
    return k > 0.55 ? null : "none";
  });
}

// ===== FORCE SIMULATION =====
const simulation = d3.forceSimulation(nodes)
  .alpha(0.8)
  .alphaDecay(0.01)
  .force("charge", d3.forceManyBody().strength(d => d.type === "organ" ? -500 : d.type === "labvalue" ? -200 : -150))
  .force("link", d3.forceLink(links).id(d => d.id)
    .distance(d => d.type === "organ_produces_lab" ? 120 : d.type === "lab_indicates_disease" ? 90 : 150)
    .strength(d => d.type === "organ_produces_lab" ? 0.4 : d.type === "lab_indicates_disease" ? 0.3 : 0.15)
  )
  .force("radialOrgan", d3.forceRadial(250, 0, 0).strength(d => d.type === "organ" ? 0.3 : 0))
  .force("radialLab", d3.forceRadial(380, 0, 0).strength(d => d.type === "labvalue" ? 0.08 : 0))
  .force("radialDisease", d3.forceRadial(500, 0, 0).strength(d => d.type === "disease" ? 0.05 : 0))
  .force("collide", d3.forceCollide().radius(d => d.radius + 12).strength(0.7))
  .on("tick", ticked);

function ticked() {
  linkElements
    .attr("x1", d => d.source.x)
    .attr("y1", d => d.source.y)
    .attr("x2", d => {
      const dx = d.target.x - d.source.x;
      const dy = d.target.y - d.source.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist === 0) return d.target.x;
      const r = (d.target.type === "disease" ? d.target.radius * 1.0 : d.target.radius) + 4;
      return d.target.x - (dx / dist) * r;
    })
    .attr("y2", d => {
      const dx = d.target.x - d.source.x;
      const dy = d.target.y - d.source.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist === 0) return d.target.y;
      const r = (d.target.type === "disease" ? d.target.radius * 1.0 : d.target.radius) + 4;
      return d.target.y - (dy / dist) * r;
    });

  nodeElements.attr("transform", d => `translate(${d.x},${d.y})`);
}

// ===== DRAG =====
function dragStart(event, d) {
  if (!event.active) simulation.alphaTarget(0.15).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragging(event, d) {
  d.fx = event.x; d.fy = event.y;
}
function dragEnd(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}

// ===== TOOLTIP =====
const tooltip = document.getElementById("tooltip");

nodeElements.on("mouseenter", function(event, d) {
  let html = '<div class="tt-label">' + d.label + '</div>';
  if (d.type === "organ") {
    html += '<div class="tt-detail">' + d.system + '</div>';
    html += '<div class="tt-detail">' + d.description + '</div>';
  } else if (d.type === "labvalue") {
    html += '<div class="tt-detail">' + d.category + ' (' + d.unit + ')</div>';
    html += '<div class="tt-range">Normbereich: ' + d.normalRange + '</div>';
    html += '<div class="tt-detail">' + d.significance + '</div>';
  } else {
    html += '<div class="tt-detail">' + d.category + '</div>';
    if (d.icd10) html += '<div class="tt-range">ICD-10: ' + d.icd10 + '</div>';
    html += '<div class="tt-detail">Schweregrad: ' + d.severity + '</div>';
  }
  tooltip.innerHTML = html;
  tooltip.classList.add("visible");

  // Glow effect on hover
  d3.select(this).select("circle, rect").attr("filter", "url(#glow)");
})
.on("mousemove", function(event) {
  const x = event.clientX + 14;
  const y = event.clientY - 10;
  tooltip.style.left = Math.min(x, window.innerWidth - 280) + "px";
  tooltip.style.top = Math.min(y, window.innerHeight - 120) + "px";
})
.on("mouseleave", function(event, d) {
  tooltip.classList.remove("visible");
  d3.select(this).select("circle").attr("filter", d.type === "organ" ? "url(#shadow)" : null);
  d3.select(this).select("rect").attr("filter", null);
});

// ===== CLICK TO HIGHLIGHT =====
let selectedNode = null;

function resetHighlight() {
  selectedNode = null;
  nodeElements.transition().duration(200).attr("opacity", 1);
  linkElements.transition().duration(200).attr("opacity", d =>
    d.type === "organ_produces_lab" ? 0.5 : d.type === "lab_indicates_disease" ? 0.4 : 0.35
  );
  labels.transition().duration(200).attr("opacity", 1);
  document.getElementById("info-panel").classList.remove("visible");
}

nodeElements.on("click", function(event, d) {
  event.stopPropagation();
  if (selectedNode === d.id) { resetHighlight(); return; }
  selectedNode = d.id;

  const neighbors = edgeIndex[d.id];
  const connected = new Set([d.id, ...neighbors]);

  nodeElements.transition().duration(250)
    .attr("opacity", n => connected.has(n.id) ? 1 : 0.08);
  labels.transition().duration(250)
    .attr("opacity", n => connected.has(n.id) ? 1 : 0.05);
  linkElements.transition().duration(250)
    .attr("opacity", l => {
      const sid = l.source.id || l.source;
      const tid = l.target.id || l.target;
      return (sid === d.id || tid === d.id) ? 0.85 : 0.03;
    });

  showInfoPanel(d);
});

svg.on("click", function() { resetHighlight(); });

// ===== INFO PANEL =====
function showInfoPanel(d) {
  const panel = document.getElementById("info-panel");
  const content = document.getElementById("info-content");
  let html = "";

  if (d.type === "organ") {
    html += '<div class="info-header"><div class="info-color-dot" style="background:' + d.color + '"></div><div><div class="info-title">' + d.label + '</div><div class="info-system">' + d.system + '</div></div></div>';
    html += '<div class="info-desc">' + d.description + '</div>';

    // Connected lab values
    const connectedLabs = [];
    const connectedDiseases = [];
    links.forEach(l => {
      const sid = l.source.id || l.source;
      const tid = l.target.id || l.target;
      if (l.type === "organ_produces_lab" && sid === d.id) {
        const lab = nodeMap[tid];
        if (lab) connectedLabs.push(lab);
      }
      if (l.type === "disease_affects_organ" && tid === d.id) {
        const dis = nodeMap[sid];
        if (dis) connectedDiseases.push(dis);
      }
    });

    if (connectedLabs.length) {
      html += '<div class="info-section-title">Laborwerte (' + connectedLabs.length + ')</div><div class="info-chips">';
      connectedLabs.forEach(lab => {
        html += '<span class="info-chip lab" data-node="' + lab.id + '">' + lab.label + '</span>';
      });
      html += '</div>';
    }
    if (connectedDiseases.length) {
      html += '<div class="info-section-title">Erkrankungen (' + connectedDiseases.length + ')</div><div class="info-chips">';
      connectedDiseases.forEach(dis => {
        html += '<span class="info-chip disease" style="background:' + severityColor(dis.severity) + '22;border-color:' + severityColor(dis.severity) + '55;color:' + severityColor(dis.severity) + '" data-node="' + dis.id + '">' + dis.label + '</span>';
      });
      html += '</div>';
    }
  } else if (d.type === "labvalue") {
    html += '<div class="info-header"><div class="info-color-dot" style="background:#028090"></div><div><div class="info-title">' + d.label + '</div><div class="info-system">' + d.category + '</div></div></div>';
    html += '<div class="info-desc">' + d.significance + '<br><strong style="color:#02C39A">Normbereich:</strong> ' + d.normalRange + ' ' + d.unit + '</div>';

    const fromOrgans = [];
    const toDiseases = [];
    links.forEach(l => {
      const sid = l.source.id || l.source;
      const tid = l.target.id || l.target;
      if (l.type === "organ_produces_lab" && tid === d.id) {
        const org = nodeMap[sid];
        if (org) fromOrgans.push(org);
      }
      if (l.type === "lab_indicates_disease" && sid === d.id) {
        const dis = nodeMap[tid];
        if (dis) toDiseases.push({ ...dis, direction: l.direction });
      }
    });
    if (fromOrgans.length) {
      html += '<div class="info-section-title">Produziert von</div><div class="info-chips">';
      fromOrgans.forEach(o => {
        html += '<span class="info-chip lab" style="background:' + o.color + '22;border-color:' + o.color + '55;color:' + o.color + '" data-node="' + o.id + '">' + o.label + '</span>';
      });
      html += '</div>';
    }
    if (toDiseases.length) {
      html += '<div class="info-section-title">Hinweis auf</div><div class="info-chips">';
      toDiseases.forEach(dis => {
        const arrow = dis.direction ? ' <span class="arrow">' + dis.direction + '</span>' : '';
        html += '<span class="info-chip disease" style="background:' + severityColor(dis.severity) + '22;border-color:' + severityColor(dis.severity) + '55;color:' + severityColor(dis.severity) + '" data-node="' + dis.id + '">' + dis.label + arrow + '</span>';
      });
      html += '</div>';
    }
  } else {
    html += '<div class="info-header"><div class="info-color-dot" style="background:' + d.color + ';border-radius:2px;transform:rotate(45deg)"></div><div><div class="info-title">' + d.label + '</div><div class="info-system">' + d.category + ' &bull; ICD-10: ' + (d.icd10 || '-') + '</div></div></div>';
    html += '<div class="info-desc">Schweregrad: <strong style="color:' + d.color + '">' + d.severity + '</strong></div>';

    const indicatingLabs = [];
    const affectedOrgans = [];
    links.forEach(l => {
      const sid = l.source.id || l.source;
      const tid = l.target.id || l.target;
      if (l.type === "lab_indicates_disease" && tid === d.id) {
        const lab = nodeMap[sid];
        if (lab) indicatingLabs.push({ ...lab, direction: l.direction });
      }
      if (l.type === "disease_affects_organ" && sid === d.id) {
        const org = nodeMap[tid];
        if (org) affectedOrgans.push(org);
      }
    });
    if (indicatingLabs.length) {
      html += '<div class="info-section-title">Laborwerte</div><div class="info-chips">';
      indicatingLabs.forEach(lab => {
        const arrow = lab.direction ? ' <span class="arrow">' + lab.direction + '</span>' : '';
        html += '<span class="info-chip lab" data-node="' + lab.id + '">' + lab.label + arrow + '</span>';
      });
      html += '</div>';
    }
    if (affectedOrgans.length) {
      html += '<div class="info-section-title">Betroffene Organe</div><div class="info-chips">';
      affectedOrgans.forEach(o => {
        html += '<span class="info-chip lab" style="background:' + o.color + '22;border-color:' + o.color + '55;color:' + o.color + '" data-node="' + o.id + '">' + o.label + '</span>';
      });
      html += '</div>';
    }
  }

  content.innerHTML = html;
  panel.classList.add("visible");

  // Make chips clickable
  content.querySelectorAll(".info-chip[data-node]").forEach(chip => {
    chip.addEventListener("click", function(e) {
      e.stopPropagation();
      const targetId = this.getAttribute("data-node");
      const targetNode = nodes.find(n => n.id === targetId);
      if (targetNode) {
        selectedNode = targetNode.id;
        const neighbors = edgeIndex[targetNode.id];
        const connected = new Set([targetNode.id, ...neighbors]);
        nodeElements.transition().duration(250).attr("opacity", n => connected.has(n.id) ? 1 : 0.08);
        labels.transition().duration(250).attr("opacity", n => connected.has(n.id) ? 1 : 0.05);
        linkElements.transition().duration(250).attr("opacity", l => {
          const sid = l.source.id || l.source;
          const tid = l.target.id || l.target;
          return (sid === targetNode.id || tid === targetNode.id) ? 0.85 : 0.03;
        });
        showInfoPanel(targetNode);
      }
    });
  });
}

document.getElementById("info-close").addEventListener("click", function(e) {
  e.stopPropagation();
  resetHighlight();
});

// ===== SEARCH =====
const searchInput = document.getElementById("search-input");
searchInput.addEventListener("input", function() {
  const q = this.value.trim().toLowerCase();
  if (!q) {
    nodeElements.transition().duration(200).attr("opacity", 1);
    labels.transition().duration(200).attr("opacity", 1);
    linkElements.transition().duration(200).attr("opacity", d =>
      d.type === "organ_produces_lab" ? 0.5 : d.type === "lab_indicates_disease" ? 0.4 : 0.35
    );
    return;
  }

  const matched = new Set();
  nodes.forEach(n => {
    const searchable = (n.label + " " + (n.system || "") + " " + (n.category || "") + " " + (n.icd10 || "") + " " + (n.significance || "")).toLowerCase();
    if (searchable.includes(q)) {
      matched.add(n.id);
      edgeIndex[n.id].forEach(nid => matched.add(nid));
    }
  });

  nodeElements.transition().duration(200).attr("opacity", n => matched.has(n.id) ? 1 : 0.06);
  labels.transition().duration(200).attr("opacity", n => matched.has(n.id) ? 1 : 0.04);
  linkElements.transition().duration(200).attr("opacity", l => {
    const sid = l.source.id || l.source;
    const tid = l.target.id || l.target;
    return (matched.has(sid) && matched.has(tid)) ? 0.7 : 0.02;
  });
});

// ===== LEGEND FILTER =====
const activeFilters = new Set();

document.querySelectorAll(".legend-item[data-filter]").forEach(item => {
  item.addEventListener("click", function() {
    const f = this.getAttribute("data-filter");
    if (activeFilters.has(f)) {
      activeFilters.delete(f);
      this.classList.remove("dimmed");
    } else {
      activeFilters.add(f);
      this.classList.add("dimmed");
    }
    applyLegendFilter();
  });
});

function applyLegendFilter() {
  if (activeFilters.size === 0) {
    nodeElements.transition().duration(200).attr("opacity", 1);
    labels.transition().duration(200).attr("opacity", 1);
    linkElements.transition().duration(200).attr("opacity", d =>
      d.type === "organ_produces_lab" ? 0.5 : d.type === "lab_indicates_disease" ? 0.4 : 0.35
    );
    return;
  }

  nodeElements.transition().duration(200)
    .attr("opacity", d => activeFilters.has(d.type) ? 0.08 : 1);
  labels.transition().duration(200)
    .attr("opacity", d => activeFilters.has(d.type) ? 0.04 : 1);
  linkElements.transition().duration(200)
    .attr("opacity", d => activeFilters.has(d.type) ? 0.03 :
      (d.type === "organ_produces_lab" ? 0.5 : d.type === "lab_indicates_disease" ? 0.4 : 0.35));
}

// ===== STATS =====
document.getElementById("stats").textContent =
  nodes.length + " Knoten \u00b7 " + links.length + " Verbindungen \u00b7 " +
  RAW_DATA.organs.length + " Organe \u00b7 " + RAW_DATA.labvalues.length + " Laborwerte \u00b7 " + RAW_DATA.diseases.length + " Erkrankungen";

// ===== INITIAL LABEL VISIBILITY =====
updateLabelVisibility();

// ===== PULSATING GLOW FOR ORGANS =====
(function pulseOrgans() {
  const organCircles = nodeElements.filter(d => d.type === "organ").select("circle");
  function pulse() {
    organCircles.transition().duration(2000).ease(d3.easeSinInOut)
      .attr("stroke-opacity", 0.7)
      .attr("stroke-width", 4)
      .transition().duration(2000).ease(d3.easeSinInOut)
      .attr("stroke-opacity", 0.3)
      .attr("stroke-width", 2)
      .on("end", pulse);
  }
  pulse();
})();

</script>
</body>
</html>
